<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations Art Generator</title>
    <script>
        async function generateImage() {
            const endpoints = [
                'https://api.pollinations.ai/v1/generate',
                'https://alternative-endpoint-1.com/api/generate',
                'https://alternative-endpoint-2.com/api/generate'
            ];
            let retries = 5;
            let lastErrorMessage = '';

            for (const endpoint of endpoints) {
                for (let attempt = 0; attempt < retries; attempt++) {
                    try {
                        const response = await fetch(endpoint); // Replace this with actual request parameters as needed
                        if (!response.ok) throw new Error('Server responded with error');
                        const data = await response.json();
                        document.getElementById('image').src = data.imageUrl;
                        return;
                    } catch (err) {
                        lastErrorMessage = err.message;
                        const waitTime = Math.pow(2, attempt) * 1000; // Exponential backoff
                        await new Promise(resolve => setTimeout(resolve, waitTime));
                    }
                }
            }
            document.getElementById('error').innerText = 'Failed to generate image: ' + lastErrorMessage;
        }
    </script>
</head>
<body>
    <h1>Pollinations Art Generator</h1>
    <button onclick="generateImage()">Generate Image</button>
    <img id="image" crossOrigin='anonymous' alt="Generated Art" />
    <div id="error" style="color: red;"></div>
</body>
</html>
