<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations Art Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <h1>Pollinations Art Generator</h1>
        <button id="generateButton">Generate Image</button>
        <div id="loading"></div>
        <div id="error"></div>
    </div>
    <script>
        async function generateImage(encodedPrompt) {
            const generatedImage = new Image();
            generatedImage.crossOrigin = 'anonymous';
            const baseUrls = [
                'https://pollinations.ai/p/',
                'https://image.pollinations.ai/prompt/',
                'https://pollinations.ai/prompt/'
            ];
            const width = 512; // Set desired width
            const height = 512; // Set desired height
            const seed = Math.floor(Math.random() * 10000); // Example seed generation
            const candidates = baseUrls.map(base => `${base}${encodedPrompt}?width=${width}&height=${height}&seed=${seed}`);

            for (const candidate of candidates) {
                let attempts = 0;
                let success = false;
                while (attempts < 3 && !success) {
                    try {
                        const response = await fetch(candidate);
                        if (!response.ok) throw new Error('Network response was not ok');
                        const blob = await response.blob();
                        generatedImage.src = URL.createObjectURL(blob);
                        generatedImage.onload = () => {
                            document.getElementById('loading').appendChild(generatedImage);
                            document.getElementById('error').innerText = '';
                        };
                        success = true;
                    } catch (error) {
                        attempts++;
                        if (attempts < 3) {
                            // Exponential backoff
                            await new Promise(resolve => setTimeout(resolve, Math.pow(2, attempts) * 1000));
                        } else {
                            document.getElementById('error').innerText = 'Failed to load image after multiple attempts.';
                        }
                    }
                }
            }
        }

        document.getElementById('generateButton').onclick = () => {
            const encodedPrompt = encodeURIComponent('your-prompt'); // Modify as needed
            generateImage(encodedPrompt);
        };
    </script>
</body>
</html>
